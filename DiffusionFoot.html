<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>AmiBa Régie 8 Caméras FIX - Switch Instant</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
body{font-family:Inter,sans-serif;background:#08080b;color:white}
.mono{font-family:'JetBrains Mono',monospace}
.ultra-video{transform:translateZ(0)}
@keyframes pulseDot{0%{box-shadow:0 0 0 0 rgba(255,255,255,.7)}70%{box-shadow:0 0 0 8px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}.live-dot{animation:pulseDot 1.5s infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;
const FIXED_ROOM = 'amibagroupe.com'; // LIEN VIEW FIXE
const ROOM = FIXED_ROOM;
const ROLE = new URLSearchParams(location.search).get('role') || (new URLSearchParams(location.search).get('id')? 'viewer' : 'admin');
const CAMNUM = parseInt(new URLSearchParams(location.search).get('cam')||'1');

function loadPeer(){
 if(window.Peer) return Promise.resolve(window.Peer);
 return new Promise((res,rej)=>{
  const s=document.createElement('script'); s.src='https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
  s.onload=()=>res(window.Peer); s.onerror=rej; document.head.appendChild(s);
 });
}

function Admin(){
 const [cams,setCams]=useState({});
 const [viewers,setViewers]=useState([]);
 const [pgm,setPgm]=useState(9);
 const [isLive,setLive]=useState(false);
 const [toast,setToast]=useState('');
 const refs=useRef({
   peer:null, screen:null, local:null,
   camStreams:{}, // {1:MediaStream}
   output:new MediaStream(), // FLUX UNIQUE ENVOYÉ AUX VIEWERS
   viewerCalls:new Map()
 });
 const pgmVideoRef=useRef(null);
 const camVideoRefs=useRef({});

 const getCamLink = (n)=> `${location.origin}${location.pathname}?id=${FIXED_ROOM}&role=cam&cam=${n}&room=${FIXED_ROOM}`;
 const getViewLink = ()=> `${location.origin}${location.pathname}?id=${FIXED_ROOM}`;

 const setOutputTrack = (newStream)=>{
   if(!newStream) return;
   const newVTrack = newStream.getVideoTracks()[0];
   const newATracks = newStream.getAudioTracks();
   if(!newVTrack) return;
   const out = refs.current.output;
   // remplacer video track dans output stream
   out.getVideoTracks().forEach(t=>{ out.removeTrack(t); });
   out.addTrack(newVTrack);
   // audio : garder si existe
   if(newATracks.length){
     out.getAudioTracks().forEach(t=>out.removeTrack(t));
     newATracks.forEach(t=>out.addTrack(t));
   }
   // Pousser vers tous les viewers déjà connectés
   refs.current.viewerCalls.forEach(call=>{
     try{
       const vSender = call.peerConnection?.getSenders().find(s=>s.track && s.track.kind==='video');
       if(vSender) vSender.replaceTrack(newVTrack);
     }catch{}
   });
 };

 const switchPGM = (n)=>{
   setPgm(n);
   let stream=null;
   if(n>=1 && n<=8) stream=refs.current.camStreams[n];
   if(n===9) stream=refs.current.screen;
   if(n===10) stream=refs.current.local;
   if(!stream){
     setToast(`CAM ${n} pas encore connectée`);
     setTimeout(()=>setToast(''),1500);
     return;
   }
   if(pgmVideoRef.current){ pgmVideoRef.current.srcObject=stream; pgmVideoRef.current.play().catch(()=>{}); }
   setOutputTrack(stream);
   setToast(`🔴 PGM > ${n<=8?'CAM '+n:n===9?'ECRAN':'LOCAL'} - Switch 0ms`);
   setTimeout(()=>setToast(''),2000);
 };

 const startAdmin = async ()=>{
   await loadPeer();
   if(refs.current.peer) refs.current.peer.destroy();
   const peer=new Peer(FIXED_ROOM,{config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});
   refs.current.peer=peer;

   peer.on('open',()=>{ setLive(true); setToast('✅ REGIE LIVE - Lien viewer fixe actif'); });

   peer.on('connection', conn=>{
     conn.on('open',()=> setViewers(v=>[...v.filter(x=>x.id!==conn.peer), {id:conn.peer, time:Date.now()}]));
     conn.on('close',()=> setViewers(v=>v.filter(x=>x.id!==conn.peer)));
   });

   peer.on('call', async call=>{
     const isCam = call.metadata?.role==='cam';
     const camId = call.metadata?.cam || 1;

     if(isCam){
       // CAMERA -> on répond sans stream, on récupère son stream
       call.answer();
       call.on('stream', stream=>{
         refs.current.camStreams[camId]=stream;
         setCams(p=>({...p,[camId]:{stream, status:'LIVE'}}));
         if(pgm===camId) switchPGM(camId);
       });
       call.on('close',()=>{ delete refs.current.camStreams[camId]; setCams(p=>{const n={...p}; delete n[camId]; return n;}); });
     }else{
       // VIEWER -> on répond avec le flux de SORTIE UNIQUE
       call.answer(refs.current.output);
       refs.current.viewerCalls.set(call.peer, call);
       call.on('close',()=> refs.current.viewerCalls.delete(call.peer));
     }
   });

   // Démarre écran par défaut
   try{
     const s=await navigator.mediaDevices.getDisplayMedia({video:{width:1920,height:1080,frameRate:60}, audio:true});
     refs.current.screen=s;
     if(pgmVideoRef.current){ pgmVideoRef.current.srcObject=s; pgmVideoRef.current.play().catch(()=>{}); }
     setOutputTrack(s);
     setPgm(9);
   }catch(e){ console.log('ecran refusé',e); }
 };

 const stopLive = ()=>{
   try{ refs.current.peer?.destroy(); }catch{}
   Object.values(refs.current.camStreams).forEach(s=>s?.getTracks().forEach(t=>t.stop()));
   refs.current.screen?.getTracks().forEach(t=>t.stop());
   refs.current.local?.getTracks().forEach(t=>t.stop());
   refs.current.viewerCalls.clear();
   refs.current.camStreams={};
   refs.current.output=new MediaStream();
   setCams({}); setViewers([]); setLive(false);
   setToast('⏹️ LIVE ARRÊTÉ - Lien reste fixe');
 };

 const startScreen= async ()=>{
   const s=await navigator.mediaDevices.getDisplayMedia({video:{width:1920,height:1080}, audio:true});
   refs.current.screen=s;
   refs.current.camStreams[9]=s;
   switchPGM(9);
 };
 const startLocal= async ()=>{
   const s=await navigator.mediaDevices.getUserMedia({video:{width:1280,height:720}, audio:true});
   refs.current.local=s;
   refs.current.camStreams[10]=s;
   switchPGM(10);
 };

 useEffect(()=>{
   Object.entries(cams).forEach(([k,v])=>{
     const el=camVideoRefs.current[k];
     if(el && v.stream && el.srcObject!==v.stream){ el.srcObject=v.stream; el.play().catch(()=>{}); }
   });
 },[cams]);

 const pgmName = pgm<=8?`CAM ${pgm}`:pgm===9?'ECRAN':'LOCAL';

 return (
 <div className="min-h-screen p-3 max-w-[1800px] mx-auto">
   <header className="h-14 flex items-center justify-between px-4 rounded-2xl bg-[#111113] border border-white/10 mb-4">
     <div className="flex items-center gap-3">
       <div className="w-9 h-9 rounded-xl bg-red-600 grid place-items-center font-black">A</div>
       <div><div className="font-black">REGIE 8 CAMS <span className="text-red-500">FIXE</span></div><div className="text-[10px] mono text-white/40">{isLive?`● LIVE • ${viewers.length} viewers • FIXE ${FIXED_ROOM}`:'OFFLINE'}</div></div>
     </div>
     <div className="flex gap-2">
       {!isLive? <button onClick={startAdmin} className="h-9 px-6 rounded-full bg-red-600 font-black text-[12px]">🔴 DÉMARRER LE LIVE</button>
       : <button onClick={stopLive} className="h-9 px-6 rounded-full bg-white text-black font-black text-[12px]">⏹️ ARRÊTER LE LIVE</button>}
       <button onClick={startScreen} className="h-9 px-4 rounded-full bg-white text-black font-black text-[11px]">ECRAN</button>
       <button onClick={startLocal} className="h-9 px-4 rounded-full bg-white/10 border border-white/10 text-[11px]">LOCAL</button>
     </div>
   </header>

   {toast && <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 px-5 py-2 rounded-full bg-white text-black font-black text-[11px]">{toast}</div>}

   <div className="grid grid-cols-12 gap-4">
     <div className="col-span-12 lg:col-span-8">
       <div className="rounded-[20px] overflow-hidden border-2 border-red-500/30 bg-black aspect-video relative">
         <video ref={pgmVideoRef} autoPlay muted playsInline className="w-full h-full object-contain bg-black"></video>
         {isLive && <div className="absolute top-3 left-3 flex gap-2"><div className="px-3 py-1.5 rounded-full bg-red-600 text-white text-[10px] font-black flex items-center gap-2"><span className="w-2 h-2 bg-white rounded-full live-dot"></span>LIVE</div><div className="px-3 py-1.5 rounded-full bg-black/70 border border-white/20 text-[10px] font-bold mono">{pgmName}</div></div>}
         {!isLive && <div className="absolute inset-0 grid place-items-center text-white/30 font-bold text-center p-4">Clique DÉMARRER LE LIVE<br/>Ton écran sera diffusé par défaut sur le lien fixe</div>}
       </div>

       <div className="mt-3 p-2 rounded-2xl bg-[#111113] border border-white/10 flex gap-2 overflow-x-auto">
         {[1,2,3,4,5,6,7,8].map(n=>(
           <button key={n} onClick={()=>switchPGM(n)} className={`min-w-[80px] h-[56px] rounded-xl border-2 font-black text-[12px] ${pgm===n?'border-red-500 bg-red-600':'border-white/10 bg-black text-white/50 hover:bg-white/10'}`}>CAM {n}<span className={`block w-1.5 h-1.5 mx-auto mt-1 rounded-full ${cams[n]?.status==='LIVE'?'bg-emerald-400':'bg-white/20'}`}></span></button>
         ))}
         <button onClick={()=>switchPGM(9)} className={`min-w-[80px] h-[56px] rounded-xl border-2 font-black text-[11px] ${pgm===9?'border-red-500 bg-red-600':'border-white/10 bg-black text-white/50'}`}>ECRAN ⭐</button>
         <button onClick={()=>switchPGM(10)} className={`min-w-[80px] h-[56px] rounded-xl border-2 font-black text-[11px] ${pgm===10?'border-red-500 bg-white text-black':'border-white/10 bg-black text-white/50'}`}>LOCAL</button>
       </div>

       <div className="mt-4 grid grid-cols-2 md:grid-cols-4 gap-3">
         {[1,2,3,4,5,6,7,8].map(n=>{
           const cam=cams[n]; const link=getCamLink(n);
           return (
             <div key={n} className={`rounded-2xl overflow-hidden border bg-[#111113] ${pgm===n?'border-red-500':'border-white/10'}`}>
               <div className="relative aspect-video bg-black">
                 <video ref={el=>camVideoRefs.current[n]=el} autoPlay muted playsInline className="w-full h-full object-cover"></video>
                 {!cam?.stream && <div className="absolute inset-0 grid place-items-center text-[11px] text-white/20">CAM {n} OFF</div>}
                 {pgm===n && <div className="absolute top-2 right-2 px-2 py-0.5 rounded-full bg-red-600 text-[8px] font-black">PGM</div>}
               </div>
               <div className="p-2">
                 <div className="flex gap-1">
                   <button onClick={()=>{navigator.clipboard.writeText(link); setToast('Lien CAM'+n+' copié');}} className="flex-1 h-7 rounded-full bg-white text-black font-black text-[10px]">Copier Lien</button>
                   <button onClick={()=>window.open(`https://wa.me/?text=${encodeURIComponent(link)}`,'_blank')} className="h-7 w-7 rounded-full bg-[#25D366] grid place-items-center text-[10px]">WA</button>
                 </div>
                 <button onClick={()=>switchPGM(n)} className="w-full mt-2 h-7 rounded-full bg-red-600/20 text-[10px] font-bold text-red-300">Mettre en PGM</button>
               </div>
             </div>
           )
         })}
       </div>
     </div>

     <div className="col-span-12 lg:col-span-4 space-y-4">
       <div className="rounded-2xl bg-[#111113] border border-white/10 p-4">
         <div className="text-[10px] font-black tracking-widest text-white/30">LIEN VIEWER FIXE</div>
         <div className="mt-2 p-3 rounded-xl bg-black mono text-[11px] text-emerald-300 border border-emerald-500/20 truncate">{getViewLink()}</div>
         <button onClick={()=>navigator.clipboard.writeText(getViewLink())} className="mt-2 w-full h-9 rounded-xl bg-white text-black font-black text-[11px]">Copier lien diffusion fixe</button>
         <div className="mt-2 text-[10px] text-white/30 leading-relaxed">Ce lien ne change JAMAIS. Tous les viewers l'utilisent. Même après ARRÊTER / DÉMARRER, c'est le même.</div>
       </div>
       <div className="rounded-2xl bg-[#111113] border border-white/10 p-4">
         <div className="text-[10px] font-black">VIEWERS: {viewers.length}</div>
         <div className="mt-2 space-y-1">{viewers.map(v=><div key={v.id} className="text-[10px] mono p-2 rounded bg-black/50">{v.id.slice(0,12)} • LIVE</div>)}</div>
       </div>
     </div>
   </div>
 </div>
 );
}

function CamPage(){
 const cam=CAMNUM; const room=FIXED_ROOM;
 const [live,setLive]=useState(false); const videoRef=useRef(null);
 const start=async()=>{
   const stream=await navigator.mediaDevices.getUserMedia({video:{width:1920,height:1080,facingMode:'environment'}, audio:true});
   videoRef.current.srcObject=stream; videoRef.current.play();
   await loadPeer();
   const peer=new Peer({config:{iceServers:[{urls:'stun:stun.l.google.com:19302'}]}});
   peer.on('open', ()=>{ peer.call(room, stream, {metadata:{role:'cam', cam:cam}}); setLive(true); });
 };
 return (<div className="min-h-screen bg-black flex flex-col"><div className="h-12 flex items-center justify-between px-4 bg-[#111113]"><div className="font-black">CAM {cam} → {room}</div><div className={`px-3 py-1 rounded-full text-[10px] font-black ${live?'bg-emerald-600':'bg-red-600'}`}>{live?'LIVE':'OFF'}</div></div><div className="flex-1 bg-black grid place-items-center relative"><video ref={videoRef} autoPlay muted playsInline className="w-full h-full object-cover"></video>{!live && <button onClick={start} className="absolute h-14 px-8 rounded-full bg-red-600 font-black">📷 ACTIVER CAM {cam}</button>}</div></div>);
}

function Viewer(){
 const [status,setStatus]=useState('Connexion au live fixe...'); const videoRef=useRef(null);
 useEffect(()=>{
   (async()=>{
     await loadPeer();
     const peer=new Peer({config:{iceServers:[{urls:'stun:stun.l.google.com:19302'}]}});
     peer.on('open',()=>{
       const call=peer.call(FIXED_ROOM, new MediaStream());
       call.on('stream', s=>{ videoRef.current.srcObject=s; videoRef.current.play().catch(()=>{ videoRef.current.muted=true; videoRef.current.play(); }); setStatus('🔴 LIVE'); });
       call.on('close',()=>setStatus('Live terminé'));
     });
     peer.on('error',()=>setStatus('En attente du direct...'));
   })();
 },[]);
 return (<div className="min-h-screen bg-black flex flex-col items-center justify-center p-4"><div className="w-full max-w-[1100px] aspect-video bg-black rounded-2xl overflow-hidden border-2 border-red-500/20 relative"><video ref={videoRef} autoPlay playsInline controls className="w-full h-full object-contain bg-black"></video><div className="absolute top-3 left-3 flex gap-2"><div className="px-3 py-1.5 rounded-full bg-red-600 text-white text-[10px] font-black flex items-center gap-2"><span className="w-2 h-2 bg-white rounded-full live-dot"></span>{status}</div><div className="px-3 py-1.5 rounded-full bg-black/60 border border-white/20 text-[10px] font-bold">AmiBa Groupe • FIXE {FIXED_ROOM}</div></div></div></div>);
}

function App(){
 if(ROLE==='cam') return <CamPage/>;
 if(new URLSearchParams(location.search).has('id')) return <Viewer/>;
 return <Admin/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
