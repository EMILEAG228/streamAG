<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>StreamShare EXTRA ULTRA - AmiBa</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
*{font-family:'Inter',sans-serif}
.mono{font-family:'JetBrains Mono',monospace}
@keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.7)}50%{box-shadow:0 0 0 12px rgba(239,68,68,0)}}
.live-dot{animation:livePulse 1.1s infinite}
video{transform:translateZ(0);will-change:transform;image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges;filter:contrast(1.06) saturate(1.12) sharpen(1);}
.btn-ultra{background:var(--theme,#ef4444);box-shadow:0 0 35px var(--themeGlow,rgba(239,68,68,.5))}
.glow{box-shadow:0 0 80px var(--themeGlow,rgba(239,68,68,.18))}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--theme,#7f1d1d);border-radius:10px}
#adOverlay{backdrop-filter:blur(12px)}
</style>
</head>
<body class="bg-[#050508] text-white min-h-screen flex flex-col selection:bg-red-600">
<div id="bgLayer" class="fixed inset-0 pointer-events-none overflow-hidden">
  <div id="bg1" class="absolute top-[-20%] left-[10%] w-[65%] h-[65%] rounded-full blur-[160px] opacity-30" style="background:var(--theme,#ef4444)"></div>
  <div id="bg2" class="absolute bottom-[-15%] right-[5%] w-[50%] h-[50%] rounded-full blur-[130px] opacity-20" style="background:var(--themeDark,#7f1d1d)"></div>
</div>
<div id="app" class="relative z-10 flex-1 flex flex-col"></div>

<!-- VIEWER OVERLAY PUB 5s -->
<div id="adOverlay" class="fixed inset-0 z-[9999] hidden bg-black/90 grid place-items-center p-4">
  <div class="relative max-w-[520px] w-full rounded-[24px] overflow-hidden border border-white/10 bg-[#0f0f12] shadow-[0_0_100px_rgba(0,0,0,.8)]">
    <div class="absolute top-3 right-3 z-20 px-2.5 py-1 rounded-full bg-white/10 border border-white/10 text-[10px] font-bold tracking-widest">PUB • <span id="adTimer">5</span>s</div>
    <img id="adOverlayImg" src="" class="w-full aspect-[4/3] object-cover">
    <div class="p-4"><div id="adOverlayTitle" class="font-black text-[18px]"></div><div id="adOverlayDesc" class="text-[13px] text-white/60 mt-1"></div><div id="adOverlayProgress" class="mt-3 h-1 bg-white/10 rounded-full overflow-hidden"><div class="h-full bg-white transition-all" style="width:100%"></div></div></div>
  </div>
</div>

<div class="relative z-20 h-[36px] bg-black border-t border-white/5 overflow-hidden flex items-center">
  <div class="whitespace-nowrap flex items-center gap-10 animate-[marquee_30s_linear_infinite] text-[11px] font-black tracking-[0.14em] text-white/60">
    <span class="px-2.5 py-1 rounded-full text-white" style="background:var(--theme,#ef4444)">AmiBa Groupe</span> EXTRA ULTRA • 120 FPS • 15 Mbps • SHARP 4K • (+228) 93896972
  </div>
</div>

<script type="module">
import Peer from 'https://esm.sh/peerjs@1.5.4?bundle'

const CONFIG = {
  qualities: {
    '720p NET': { w:1280,h:720,br:4000,fps:60, hint:'detail' },
    '1080p SHARP': { w:1920,h:1080,br:8000,fps:60, hint:'detail' },
    '4K ULTRA NET': { w:2560,h:1440,br:12000,fps:60, hint:'detail' },
    'EXTRA ULTRA': { w:3840,h:2160,br:15000,fps:120, hint:'detail' }
  },
  themes: [
    { name:'Rouge AmiBa', color:'#ef4444', dark:'#7f1d1d', glow:'rgba(239,68,68,.35)' },
    { name:'Bleu Cyber', color:'#3b82f6', dark:'#1e3a8a', glow:'rgba(59,130,246,.35)' },
    { name:'Violet Neon', color:'#a855f7', dark:'#581c87', glow:'rgba(168,85,247,.35)' },
    { name:'Emeraude', color:'#10b981', dark:'#064e3b', glow:'rgba(16,185,129,.35)' },
    { name:'Orange Fire', color:'#f97316', dark:'#7c2d12', glow:'rgba(249,115,22,.35)' },
    { name:'Rose Gold', color:'#ec4899', dark:'#831843', glow:'rgba(236,72,153,.35)' },
  ],
  ads: [
    { img:'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800&h=600&fit=crop&q=90', title:'Site Premium AmiBa', desc:'Création sur-mesure ultra rapide', link:'#' },
    { img:'https://images.unsplash.com/photo-1556761175-b413da4baf72?w=800&h=600&fit=crop&q=90', title:'Boutique en Ligne', desc:'Vendez 24h/24', link:'#' },
  ]
}

const ROOM = new URLSearchParams(location.search).get('id')?.toUpperCase().trim() || '';
const isViewer = !!ROOM;
const genId = () => { const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s=''; for(let i=0;i<6;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; }
const getLink = (id) => `${location.origin}${location.pathname}?id=${id}`

let state = {
  status:'idle', error:'', roomId:'',
  quality:'EXTRA ULTRA',
  theme: JSON.parse(localStorage.getItem('amiba_theme')||'null') || CONFIG.themes[0],
  logoSrc:null, logoSize:90,
  adIndex:0, adList:[...CONFIG.ads],
  viewersList:[],
  // viewer only
  vStatus: isViewer? 'connecting':'idle', vMsg:'',
  viewerMuted:true,
  liveAdRunning:false,
}
let refs = { preview:null, remote:null, viewerBox:null, displayStream:null, peer:null, calls:new Map(), remoteStream:null }

function applyTheme(t){
  state.theme=t; localStorage.setItem('amiba_theme', JSON.stringify(t));
  document.documentElement.style.setProperty('--theme', t.color);
  document.documentElement.style.setProperty('--themeDark', t.dark);
  document.documentElement.style.setProperty('--themeGlow', t.glow);
}
applyTheme(state.theme);

function getConstraints(){
  const q = CONFIG.qualities[state.quality];
  return {
    video:{
      width:{ ideal:q.w, max:q.w }, height:{ ideal:q.h, max:q.h },
      frameRate:{ ideal:q.fps, max:q.fps },
      cursor:'always', displaySurface:'monitor',
      // sharpness hints
    },
    audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false, sampleRate:48000, channelCount:2 }
  }
}
function optimizeSender(sender){
  if(!sender) return;
  const q = CONFIG.qualities[state.quality];
  const p = sender.getParameters();
  if(!p.encodings) p.encodings=[{}];
  p.encodings[0].maxBitrate = q.br*1000;
  p.encodings[0].priority='high';
  p.encodings[0].networkPriority='high';
  p.degradationPreference='maintain-resolution'; // SHARP - garde résolution
  sender.setParameters(p).catch(()=>{});
}
async function fetchIP(){
  try{ const r=await fetch('https://ipapi.co/json/').then(x=>x.json()); return {ip:r.ip,city:r.city,region:r.region,country:r.country_name,cc:r.country_code} }
  catch{ try{ const r=await fetch('https://ipwho.is/').then(x=>x.json()); return {ip:r.ip,city:r.city,region:r.region,country:r.country,cc:r.country_code} }catch{ return {ip:'-',city:'-',region:'-',country:'-',cc:'--'} } }
}

function render(){ document.getElementById('app').innerHTML = isViewer? renderViewer():renderBroadcaster(); cache(); bind(); setTimeout(restore,80); }
function cache(){ refs.preview=document.getElementById('preview'); refs.remote=document.getElementById('remote'); refs.viewerBox=document.getElementById('viewerBox'); }
function restore(){
  if(!isViewer && refs.displayStream && refs.preview){ refs.preview.srcObject=refs.displayStream; refs.preview.muted=true; refs.preview.play().catch(()=>{}); }
  if(isViewer && refs.remoteStream && refs.remote){ refs.remote.srcObject=refs.remoteStream; refs.remote.muted=state.viewerMuted; refs.remote.playsInline=true; refs.remote.play().catch(()=>{}); }
}

// BROADCASTER
function renderBroadcaster(){
  const url=state.roomId?getLink(state.roomId):''; const isLive=state.status==='live';
  return `
  <header class="h-[62px] border-b border-white/5 bg-black/60 backdrop-blur-2xl flex items-center justify-between px-4 sticky top-0 z-20">
    <div class="flex items-center gap-3"><div class="w-9 h-9 rounded-xl grid place-items-center font-black" style="background:linear-gradient(135deg,var(--theme),var(--themeDark))">AG</div><div><div class="font-black text-[13px]">STREAM <span style="color:var(--theme)">EXTRA ULTRA</span></div><div class="text-[9px] tracking-[0.2em] text-white/30 font-bold">SHARP • ${state.quality}</div></div></div>
    <div class="flex items-center gap-2">${isLive?`<span class="mono text-[11px] px-2.5 py-1 rounded-full bg-white/5 border border-white/10">${state.roomId}</span><span class="px-3 h-7 rounded-full text-white text-[11px] font-black flex items-center gap-2" style="background:var(--theme)"><span class="w-2 h-2 bg-white rounded-full live-dot"></span>LIVE ${state.viewersList.length}</span>`:`<span class="text-[10px] px-3 py-1 rounded-full border font-bold" style="border-color:var(--theme);color:var(--theme);background:color-mix(in srgb,var(--theme) 12%, transparent)">EXTRA RAPIDE • 0ms</span>`}</div>
  </header>
  <main class="flex-1 max-w-[1800px] mx-auto w-full p-4">
  ${!isLive?`
    <div class="grid lg:grid-cols-[310px_1fr_380px] gap-4">
      <div class="space-y-3">
        <div class="rounded-[20px] border border-white/10 bg-[#0f0f12]/80 backdrop-blur-xl p-4 glow">
          <div class="flex justify-between mb-3"><span class="text-[11px] font-black tracking-widest text-white/30">NETTETÉ & VITESSE</span><span class="text-[9px] px-2 py-0.5 rounded-full bg-emerald-500/15 text-emerald-300 border border-emerald-500/20">120 FPS</span></div>
          <div class="grid grid-cols-1 gap-2">${Object.keys(CONFIG.qualities).map(k=>`<button data-q="${k}" class="qbtn h-11 rounded-xl border text-[11px] font-black text-left px-3 flex items-center justify-between ${state.quality===k?'text-white border-[var(--theme)]':'bg-black/60 border-white/10 text-white/40'}" style="${state.quality===k?`background:var(--theme);box-shadow:0 0 20px var(--themeGlow)`:''}"><span>${k}</span><span class="text-[10px] opacity-70">${CONFIG.qualities[k].br/1000} Mbps</span></button>`).join('')}</div>
          <div class="mt-3 text-[10px] p-2.5 rounded-xl bg-black/50 border border-white/5 text-white/40">Mode <b class="text-white/70">maintain-resolution</b> activé = image toujours nette, jamais floue. 4K upscale + sharpen CSS.</div>
        </div>
        <div class="rounded-[20px] border border-white/10 bg-[#0f0f12]/80 p-4">
          <div class="text-[11px] font-black tracking-widest text-white/30 mb-3">🎨 COULEUR DU SITE</div>
          <div class="grid grid-cols-3 gap-2">${CONFIG.themes.map((t,i)=>`<button data-theme="${i}" class="h-11 rounded-xl border-2 flex flex-col items-center justify-center gap-0.5 ${state.theme.color===t.color?'border-white': 'border-white/10'}" style="background:${t.color}"><span class="text-[9px] font-black text-white drop-shadow">${t.name.split(' ')[0]}</span></button>`).join('')}</div>
          <div class="mt-3 flex gap-2"><input id="customColor" type="color" value="${state.theme.color}" class="w-10 h-9 rounded-xl bg-black border border-white/10"><span class="text-[11px] text-white/40 flex items-center">Couleur perso</span></div>
        </div>
        <div class="rounded-[20px] border border-white/10 bg-white/[0.03] p-4"><div class="text-[11px] font-black tracking-widest text-white/30 mb-2">LOGO</div><label class="h-10 rounded-xl bg-white/[0.06] border border-white/10 grid place-items-center cursor-pointer text-[12px]"><input id="logoFile" type="file" accept="image/*" class="hidden">📁 Logo PNG</label>${state.logoSrc?`<div class="mt-2 flex gap-2 items-center"><img src="${state.logoSrc}" class="w-10 h-10 rounded bg-white/10"><input id="logoSizeRange" type="range" min="30" max="200" value="${state.logoSize}" class="flex-1 accent-white"><button id="removeLogo" class="w-6 h-6 rounded-full bg-white/10">✕</button></div>`:''}</div>
        <div class="rounded-[20px] border border-white/10 bg-[#0f0f12]/80 p-4"><div class="text-[11px] font-black tracking-widest text-white/30 mb-2">PUBS LATÉRALES</div><div class="space-y-2 max-h-[160px] overflow-auto">${state.adList.map((a,i)=>`<div class="flex gap-2 p-2 rounded-xl bg-black/60 border border-white/5"><img src="${a.img}" class="w-10 h-10 rounded object-cover"><div class="flex-1 truncate text-[11px]"><b>${a.title}</b><div class="text-white/40">${a.desc}</div></div><button data-del="${i}" class="delAd text-[10px] px-2 rounded-full bg-white/5">x</button></div>`).join('')}</div><div class="mt-2 grid grid-cols-2 gap-1"><input id="adTitle" placeholder="Titre" class="h-8 px-2 rounded-lg bg-black border border-white/10 text-[11px]"><input id="adDesc" placeholder="Desc" class="h-8 px-2 rounded-lg bg-black border border-white/10 text-[11px]"><input id="adImgInput" placeholder="URL image HD" class="col-span-2 h-8 px-2 rounded-lg bg-black border border-white/10 text-[11px]"><button id="addAd" class="col-span-2 h-8 rounded-lg bg-white text-black font-black text-[11px]">+ Ajouter</button></div></div>
      </div>
      <div class="space-y-3"><div class="relative rounded-[26px] border border-white/10 bg-black overflow-hidden aspect-video grid place-items-center"><div class="text-center p-6"><div class="text-2xl mb-2">⚡👁️</div><div class="font-black">Aperçu EXTRA NET</div><div class="text-[11px] text-white/30 mt-1">${CONFIG.qualities[state.quality].w}x${CONFIG.qualities[state.quality].h} • ${CONFIG.qualities[state.quality].br/1000} Mbps • maintain-resolution</div></div><div class="absolute bottom-3 inset-x-3 flex justify-center"><button id="startBtn" class="btn-ultra h-[54px] px-8 rounded-full font-black text-white flex items-center gap-2">🔴 LANCER EXTRA ULTRA</button></div></div>${state.error?`<div class="p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-[12px]">${state.error}</div>`:''}</div>
      <div class="space-y-3"><div class="rounded-[20px] border border-white/10 bg-[#0f0f12]/90 p-3"><div class="text-[11px] font-black tracking-widest text-white/30 mb-2">PUB LIVE 5s - TEST</div><div class="relative rounded-xl overflow-hidden aspect-[4/3] bg-black border border-white/10"><img src="${state.adList[state.adIndex]?.img}" class="w-full h-full object-cover"><div class="absolute bottom-0 p-2 w-full bg-gradient-to-t from-black to-transparent"><div class="text-[11px] font-bold">${state.adList[state.adIndex]?.title}</div></div></div><div class="mt-2 text-[10px] text-white/40">En live tu pourras lancer une pub qui s'affiche 5s chez tous les viewers</div></div></div>
    </div>
  `:`
    <div class="grid lg:grid-cols-[330px_1fr_400px] gap-4">
      <div class="space-y-3 lg:sticky top-[80px] h-fit">
        <div class="rounded-[20px] border p-5" style="border-color:var(--theme);background:color-mix(in srgb,var(--theme) 8%, #121214)"><div class="text-[11px] font-black tracking-widest text-white/30 mb-2">LIEN VIEWER - SANS RETOUR</div><div class="rounded-xl bg-black border border-white/10 p-3"><div class="text-[9px] text-white/30">ROOM ID</div><div class="mono text-[22px] font-black tracking-[0.2em]" style="color:var(--theme)">${state.roomId}</div></div><div class="mt-2 h-10 rounded-xl bg-black border border-white/10 flex items-center px-3 gap-2"><div class="mono flex-1 truncate text-[11px] text-white/50">${url}</div><button id="copyLink" class="h-7 px-3 rounded-full text-white text-[11px] font-black" style="background:var(--theme)">Copier</button></div><button id="stopBtn" class="mt-3 w-full h-10 rounded-xl bg-red-600 text-white font-black">⏹ Stopper</button></div>

        <div class="rounded-[20px] border border-white/10 bg-[#0f0f12]/90 p-4">
          <div class="text-[11px] font-black tracking-widest text-white/30 mb-2">🚀 LIVE PUB 5 SECONDES</div>
          <div class="grid grid-cols-2 gap-2 mb-2">${state.adList.map((a,i)=>`<button data-livead="${i}" class="liveAdBtn relative rounded-xl overflow-hidden border border-white/10 aspect-[4/3] group"><img src="${a.img}" class="w-full h-full object-cover group-hover:scale-105 transition"><div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div><span class="absolute bottom-1 left-1 text-[9px] font-bold bg-black/60 px-1.5 py-0.5 rounded-full">${a.title.slice(0,12)}</span></button>`).join('')}</div>
          <div class="flex gap-2"><input id="liveAdCustomImg" placeholder="URL image pub 5s" class="flex-1 h-8 px-2 rounded-lg bg-black border border-white/10 text-[11px]"><button id="launchCustomAd" class="h-8 px-3 rounded-lg text-white font-bold text-[11px]" style="background:var(--theme)">Lancer 5s</button></div>
          <div class="mt-2 text-[10px] text-white/30">Clique = pub plein écran 5s chez TOUS les viewers. Pas de retour possible viewer → diffuseur.</div>
        </div>

        <div class="rounded-[20px] border border-white/10 bg-white/[0.03] p-4"><div class="flex justify-between mb-2"><span class="text-[11px] font-black tracking-widest text-white/30">APPAREILS</span><span class="text-[10px] px-2 py-0.5 rounded-full bg-emerald-500/15 text-emerald-300 border border-emerald-500/20">${state.viewersList.length} live</span></div><div class="space-y-2 max-h-[300px] overflow-auto">${state.viewersList.length===0?`<div class="text-[11px] text-white/30 text-center p-3 bg-black/40 rounded-xl">En attente...</div>`:state.viewersList.map(v=>`<div class="p-2.5 rounded-xl bg-black/60 border border-white/5 text-[11px]"><div class="flex justify-between"><span class="mono font-bold">${v.peerId.slice(0,6)}</span><span class="text-[9px] px-1.5 py-0.5 rounded-full bg-white/5">${v.cc||'--'}</span></div><div class="mt-1 flex justify-between text-white/40"><span>IP</span><span class="mono text-white/70">${v.ip}</span></div><div class="flex justify-between text-white/40"><span>Région</span><span class="truncate max-w-[120px] text-white/60">${v.city}, ${v.region}</span></div></div>`).join('')}</div></div>
      </div>

      <div class="space-y-2"><div class="relative rounded-[26px] overflow-hidden border-2 bg-black aspect-video shadow-[0_0_80px_var(--themeGlow)]" style="border-color:var(--theme)"><video id="preview" autoplay muted playsinline class="w-full h-full object-contain bg-black"></video>${state.logoSrc?`<img id="logoOverlay" src="${state.logoSrc}" class="absolute bottom-4 right-4 z-20 object-contain border border-white/10 shadow-xl rounded-full bg-white/90 p-1" style="width:${state.logoSize}px;height:${state.logoSize}px">`:''}<div class="absolute top-3 left-3 flex gap-2"><span class="px-2.5 py-1 rounded-full text-white text-[10px] font-black flex items-center gap-1.5" style="background:var(--theme)"><span class="w-2 h-2 bg-white rounded-full live-dot"></span>REC • ${state.quality} • SHARP</span><span class="px-2.5 py-1 rounded-full bg-black/70 border border-white/10 text-[10px] mono">15 Mbps • CRISP</span></div></div></div>

      <div class="space-y-3 lg:sticky top-[80px] h-fit"><div class="rounded-[20px] border border-white/10 bg-[#0f0f12]/90 overflow-hidden"><div class="h-10 px-4 flex items-center justify-between border-b border-white/5 bg-black/50"><span class="text-[10px] font-black tracking-widest text-white/30">PUB LATÉRALE VIEWER</span><button id="rotateAd" class="text-[10px] px-2 py-1 rounded-full bg-white/5">↻</button></div><div class="p-3"><div class="relative rounded-xl overflow-hidden aspect-[4/3] bg-black border border-white/10"><img id="adLiveImg" src="${state.adList[state.adIndex]?.img}" class="w-full h-full object-cover"><div class="absolute bottom-0 p-2 w-full bg-gradient-to-t from-black/80"><div class="text-[11px] font-bold">${state.adList[state.adIndex]?.title}</div><div class="text-[10px] text-white/50">${state.adList[state.adIndex]?.desc}</div></div></div></div></div></div>
    </div>
  `}
  </main>`
}
function renderViewer(){
  // VIEWER BLINDÉ - AUCUN LIEN RETOUR
  return `
  <main class="flex-1 flex flex-col min-h-screen">
    <div class="flex-1 grid lg:grid-cols-[1fr_380px] gap-0">
      <div class="relative bg-black flex flex-col">
        <div id="viewerBox" class="relative flex-1 bg-black lg:h-screen flex items-center justify-center overflow-hidden">
          ${state.vStatus!=='connected'?`<div class="absolute inset-0 z-20 grid place-items-center bg-[#050508]"><div class="text-center p-8"><div class="w-12 h-12 mx-auto rounded-full border-2 border-white/10 border-t-[var(--theme)] animate-spin mb-4" style="border-top-color:var(--theme)"></div><p class="font-black text-[14px]">${state.vMsg||'Connexion EXTRA ULTRA...'}</p><p class="text-[10px] text-white/20 mt-3 mono tracking-widest">LIVE • SHARP • 0ms BUFFER</p></div></div>`:''}
          <video id="remote" autoplay playsinline class="w-full h-full object-contain bg-black" style="max-height:100vh;image-rendering:-webkit-optimize-contrast;filter:contrast(1.08) saturate(1.15)"></video>
          ${state.vStatus==='connected'?`<div class="absolute bottom-0 inset-x-0 z-10 p-3 bg-gradient-to-t from-black via-black/40 to-transparent flex items-center justify-between pointer-events-none"><div class="flex items-center gap-2 pointer-events-auto"><button id="muteBtn" class="w-9 h-9 rounded-full bg-white/10 backdrop-blur border border-white/10">${state.viewerMuted?'🔇':'🔊'}</button><span class="px-2 py-1 rounded-full bg-black/60 border border-white/10 text-[9px] mono tracking-widest text-white/60">EXTRA ULTRA NET</span></div><button id="fsBtn" class="w-9 h-9 rounded-full bg-white/10 backdrop-blur border border-white/10 pointer-events-auto">⛶</button></div>`:''}
        </div>
      </div>
      <div class="bg-[#0a0a0c] border-l border-white/5 flex flex-col lg:h-screen overflow-auto">
        <div class="p-4 border-b border-white/5 flex items-center justify-between"><span class="text-[11px] font-black tracking-widest text-white/30">PUBLICITÉ</span><span class="text-[9px] px-2 py-1 rounded-full border text-white/50" style="border-color:var(--theme);color:var(--theme)">LIVE</span></div>
        <div class="p-3 space-y-3">
          <div class="relative rounded-[16px] overflow-hidden aspect-[4/3] bg-black border border-white/10"><img id="adImg" src="${state.adList[state.adIndex]?.img}" class="w-full h-full object-cover"><div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/10 to-transparent"></div><div class="absolute bottom-0 p-3 w-full"><div class="text-[11px] font-black px-2 py-1 rounded-full text-white inline-flex mb-2" style="background:var(--theme)">${state.adList[state.adIndex]?.title||''}</div><div class="text-[13px] font-bold leading-tight">${state.adList[state.adIndex]?.desc||''}</div></div></div>
          <div class="rounded-[16px] border p-4" style="border-color:color-mix(in srgb,var(--theme) 30%, transparent);background:color-mix(in srgb,var(--theme) 10%, #0f0f12)"><div class="text-[13px] font-black">Votre pub ici ?</div><div class="text-[11px] text-white/50 mt-1">Contact AmiBa Groupe pour diffuser pendant le live</div><div class="mt-3 h-9 rounded-full grid place-items-center text-white font-bold text-[12px]" style="background:var(--theme)">(+228) 93896972</div></div>
          <div class="grid grid-cols-2 gap-2">${state.adList.map(a=>`<div class="rounded-xl overflow-hidden border border-white/5 bg-black aspect-[4/3] relative"><img src="${a.img}" class="w-full h-full object-cover"><div class="absolute bottom-0 inset-x-0 p-1.5 bg-gradient-to-t from-black/80"><div class="text-[10px] font-bold truncate">${a.title}</div></div></div>`).join('')}</div>
        </div>
        <div class="mt-auto p-3 text-[9px] text-white/20 text-center tracking-widest">STREAM ULTRA NET • SHARP • P2P</div>
      </div>
    </div>
  </main>`
}
function bind(){
  document.getElementById('startBtn')?.addEventListener('click', startBroadcast);
  document.getElementById('stopBtn')?.addEventListener('click', stopAll);
  document.getElementById('copyLink')?.addEventListener('click', copyLink);
  document.getElementById('logoFile')?.addEventListener('change', e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ state.logoSrc=r.result; render(); }; r.readAsDataURL(f); });
  document.getElementById('removeLogo')?.addEventListener('click', ()=>{ state.logoSrc=null; render(); });
  document.getElementById('logoSizeRange')?.addEventListener('input', e=>{ state.logoSize=parseInt(e.target.value); document.getElementById('logoOverlay')?.style.setProperty('width', e.target.value+'px'); document.getElementById('logoOverlay')?.style.setProperty('height', e.target.value+'px'); });
  document.querySelectorAll('.qbtn').forEach(b=>b.addEventListener('click', e=>{ state.quality=e.currentTarget.dataset.q; render(); }));
  document.querySelectorAll('[data-theme]').forEach(b=>b.addEventListener('click', e=>{ const i=parseInt(e.currentTarget.dataset.theme); applyTheme(CONFIG.themes[i]); render(); }));
  document.getElementById('customColor')?.addEventListener('input', e=>{ const c=e.target.value; applyTheme({ name:'Custom', color:c, dark:c+'99', glow:c+'55' }); });
  document.getElementById('addAd')?.addEventListener('click', ()=>{ const t=document.getElementById('adTitle').value.trim(); const d=document.getElementById('adDesc')?.value.trim()||''; const img=document.getElementById('adImgInput').value.trim(); if(!img) return alert('URL image'); state.adList.push({ img, title:t||'Pub', desc:d, link:'#' }); render(); });
  document.querySelectorAll('.delAd').forEach(b=>b.addEventListener('click', e=>{ state.adList.splice(parseInt(e.currentTarget.dataset.del),1); render(); }));
  document.getElementById('rotateAd')?.addEventListener('click', ()=>{ state.adIndex=(state.adIndex+1)%state.adList.length; render(); });
  document.getElementById('muteBtn')?.addEventListener('click', ()=>{ state.viewerMuted=!state.viewerMuted; if(refs.remote) refs.remote.muted=state.viewerMuted; const btn=document.getElementById('muteBtn'); if(btn) btn.textContent=state.viewerMuted?'🔇':'🔊'; });
  document.getElementById('fsBtn')?.addEventListener('click', ()=>{ if(!document.fullscreenElement) refs.viewerBox?.requestFullscreen(); else document.exitFullscreen(); });
  // LIVE PUB 5s
  document.querySelectorAll('.liveAdBtn').forEach(b=>b.addEventListener('click', e=>{ const i=parseInt(e.currentTarget.dataset.livead); launchLiveAd(state.adList[i]); }));
  document.getElementById('launchCustomAd')?.addEventListener('click', ()=>{ const url=document.getElementById('liveAdCustomImg').value.trim()||document.getElementById('adLiveImg')?.src; if(!url) return; launchLiveAd({ img:url, title:'PUB LIVE', desc:'Offre spéciale 5s' }); });
}

function launchLiveAd(ad){
  if(!refs.calls.size) return alert('Aucun viewer connecté');
  // Show locally for preview? no, only viewers
  refs.calls.forEach(({conn})=>{
    try{ conn.send({ type:'LIVE_AD', payload:{ ...ad, duration:5000 } }); }catch{}
  });
  // Also show on broadcaster as feedback
  showAdOverlay(ad, 5000, true);
}

function showAdOverlay(ad, duration=5000, isPreview=false){
  const overlay=document.getElementById('adOverlay');
  if(!overlay) return;
  document.getElementById('adOverlayImg').src=ad.img;
  document.getElementById('adOverlayTitle').textContent=ad.title;
  document.getElementById('adOverlayDesc').textContent=ad.desc;
  overlay.classList.remove('hidden');
  let timeLeft = duration/1000;
  document.getElementById('adTimer').textContent=timeLeft;
  const prog = document.querySelector('#adOverlayProgress div');
  if(prog) prog.style.width='100%';
  const interval = setInterval(()=>{
    timeLeft-=0.1;
    document.getElementById('adTimer').textContent=Math.ceil(timeLeft);
    if(prog) prog.style.width=(timeLeft/(duration/1000)*100)+'%';
    if(timeLeft<=0){ clearInterval(interval); overlay.classList.add('hidden'); }
  },100);
  setTimeout(()=>{ overlay.classList.add('hidden'); clearInterval(interval); }, duration);
}

async function startBroadcast(){
  if(state.status==='requesting') return; state.status='requesting'; render();
  try{
    const stream = await navigator.mediaDevices.getDisplayMedia(getConstraints());
    stream.getVideoTracks().forEach(t=>{ try{ t.contentHint='detail'; }catch{} });
    refs.displayStream=stream;
    const roomId=genId();
    const peer=new Peer(roomId,{ config:{ iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'},{urls:'stun:stun2.l.google.com:19302'},{urls:'stun:stun.cloudflare.com:3478'}], sdpSemantics:'unified-plan' } });
    refs.peer=peer; refs.calls.clear();
    peer.on('open', id=>{ state.roomId=id; state.status='live'; state.viewersList=[]; render(); });
    peer.on('connection', conn=>{
      conn.on('open', ()=>{
        conn.on('data', d=>{
          if(d?.type==='VIEWER_INFO'){ const ex=state.viewersList.find(v=>v.peerId===conn.peer); if(ex) Object.assign(ex,d.payload); else state.viewersList.push({ peerId:conn.peer, joinedAt:Date.now(),...d.payload }); render(); }
        });
        try{
          const call=peer.call(conn.peer, stream);
          call.peerConnection?.getSenders().forEach(s=>{ if(s.track?.kind==='video') optimizeSender(s); });
          refs.calls.set(conn.peer,{conn,call});
          state.viewersList.push({ peerId:conn.peer, ip:'...', city:'-', region:'-', country:'-', cc:'', joinedAt:Date.now() }); render();
        }catch{}
        conn.on('close', ()=>{ refs.calls.delete(conn.peer); state.viewersList=state.viewersList.filter(v=>v.peerId!==conn.peer); render(); });
      });
    });
    peer.on('call', c=>c.answer(stream));
    stream.getVideoTracks()[0].addEventListener('ended', stopAll);
  }catch(e){ state.error=e.message; state.status='error'; render(); }
}
function stopAll(){ try{ refs.displayStream?.getTracks().forEach(t=>t.stop()); }catch{} try{ refs.calls.forEach(({call,conn})=>{ try{call.close()}catch{} try{conn.close()}catch{} }); }catch{} try{ refs.peer?.destroy(); }catch{} refs.displayStream=null; refs.calls.clear(); state.viewersList=[]; state.roomId=''; state.status='idle'; render(); }
function copyLink(){ navigator.clipboard.writeText(getLink(state.roomId)).then(()=>{ const b=document.getElementById('copyLink'); if(b){ b.textContent='Copié!'; setTimeout(()=>b.textContent='Copier',1200); } }); }

async function initViewer(){
  if(!isViewer) return; state.vStatus='connecting'; state.vMsg='Connexion EXTRA ULTRA...'; render();
  try{
    const peer=new Peer({ config:{ iceServers:CONFIG.iceServers||[{urls:'stun:stun.l.google.com:19302'}] } }); refs.peer=peer; const dummy=new MediaStream();
    peer.on('open', ()=>{
      const conn=peer.connect(ROOM,{ reliable:true });
      conn.on('open', async ()=>{
        state.vStatus='waiting'; state.vMsg='En attente du flux...'; render();
        const info=await fetchIP(); conn.send({ type:'VIEWER_INFO', payload:{ ip:info.ip, city:info.city, region:info.region, country:info.country, cc:info.cc } });
        const call=peer.call(ROOM,dummy);
        call.on('stream', remote=>{
          refs.remoteStream=remote;
          const pc=call.peerConnection; const recv=pc?.getReceivers().find(r=>r.track?.kind==='video');
          if(recv){ try{ recv.playoutDelayHint=0; recv.jitterBufferTarget=0; }catch{} }
          state.vStatus='connected'; render();
        });
        conn.on('data', d=>{ if(d?.type==='LIVE_AD'){ showAdOverlay(d.payload, d.payload.duration||5000); } });
      });
      conn.on('error', ()=>{ state.vStatus='notfound'; state.vMsg='Room introuvable'; render(); });
    });
    peer.on('call', call=>{ call.answer(dummy); call.on('stream', r=>{ refs.remoteStream=r; state.vStatus='connected'; render(); }); call.peerConnection?.addEventListener('track', e=>{ if(e.streams[0]){ refs.remoteStream=e.streams[0]; state.vStatus='connected'; render(); } }); });
  }catch(e){ state.vStatus='error'; state.vMsg=e.message; render(); }
}
setInterval(()=>{ state.adIndex=(state.adIndex+1)%(state.adList.length||1); const a=document.getElementById('adImg'); if(a) a.src=state.adList[state.adIndex].img; const b=document.getElementById('adLiveImg'); if(b) b.src=state.adList[state.adIndex].img; }, 6000);
render(); if(isViewer) initViewer();
</script>
