// ===== IP FIX ULTRA FIABLE =====
async function getIP(){
  // Essai 1: ipapi.co (le plus complet)
  try{
    const r = await fetch('https://ipapi.co/json/').then(j=>j.json());
    if(r.ip) return {ip:r.ip, city:r.city, region:r.region, country:r.country_name, code:r.country_code, isp:r.org};
  }catch{}
  // Essai 2: ipwho.is
  try{
    const r = await fetch('https://ipwho.is/').then(j=>j.json());
    if(r.ip) return {ip:r.ip, city:r.city, region:r.region, country:r.country, code:r.country_code, isp:r.connection?.isp||r.isp};
  }catch{}
  // Essai 3: ipify + ipapi fallback
  try{
    const ip = await fetch('https://api.ipify.org?format=json').then(j=>j.json()).then(j=>j.ip);
    const geo = await fetch(`https://ipwho.is/${ip}`).then(j=>j.json());
    return {ip, city:geo.city, region:geo.region, country:geo.country, code:geo.country_code, isp:geo.connection?.isp};
  }catch{}
  return {ip:'Inconnue', city:'-', region:'-', country:'-', code:'--', isp:'-'};
}

function render(){

  refs.remote=document.getElementById('remote');
  refs.box=document.getElementById('viewerBox');
  bind();
  setTimeout(restore,100);
}
function restore(){
  if(!isViewer && refs.stream && refs.preview){ refs.preview.srcObject=refs.stream; refs.preview.play().catch(()=>{}); }
  if(isViewer && state.remoteStream && refs.remote){ refs.remote.srcObject=state.remoteStream; refs.remote.muted=state.muted; refs.remote.play().catch(()=>{}); }
}

        <div class="h-11 px-4 flex items-center justify-between bg-black/50 border-b border-white/5"><span class="text-[11px] font-black tracking-widest text-white/30">PUBLICITÉ</span><span class="text-[10px] px-2 py-1 rounded-full bg-red-500/10 border border-red-500/20 text-red-300">AMIBA</span></div>
        <div class="p-3 space-y-3">
          <div class="relative rounded-[16px] overflow-hidden aspect-[4/3] bg-black border border-white/10">
            <img id="adImgV" src="${ad.img}" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/30 to-transparent"></div>
            <div class="absolute bottom-0 p-3 w-full">
              <div class="text-[11px] font-black px-2 py-1 rounded-full bg-red-600 text-white inline-flex mb-2">${ad.title}</div>
              <div class="text-[13px] font-bold leading-tight">${ad.desc}</div>
              <a href="${ad.url}" target="_blank" class="mt-2 h-9 rounded-full bg-white text-black grid place-items-center text-[12px] font-black">${ad.btn}</a>
            </div>
          </div>
          <div class="rounded-xl bg-gradient-to-br from-red-600/10 to-red-900/10 border border-red-500/20 p-3">
            <div class="text-[12px] font-black">Besoin d'un site ?</div><div class="text-[11px] text-white/40">AmiBa Groupe • 93896972 / 98959323</div>
            <div class="mt-2 grid grid-cols-2 gap-2"><a href="tel:93896972" class="h-9 rounded-full bg-red-600 text-white grid place-items-center text-[11px] font-bold">📞 Appeler</a><a href="mailto:emileagbabli7@gmail.com" class="h-9 rounded-full bg-white text-black grid place-items-center text-[11px] font-bold">Email</a></div>
          </div>
        </div>
      </div>
    </div>
  </main>`
}

function bind(){
  document.getElementById('startBtn')?.addEventListener('click', start);
  document.getElementById('stop')?.addEventListener('click', stopAll);
  document.getElementById('copy')?.addEventListener('click', ()=>{ navigator.clipboard.writeText(link(state.roomId)); const b=document.getElementById('copy'); b.textContent='Copié!'; setTimeout(()=>b.textContent='Copier',1500); });
  document.getElementById('joinBtn')?.addEventListener('click', join);
  document.getElementById('logoFile')?.addEventListener('change', e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ state.logoSrc=r.result; render(); }; r.readAsDataURL(f); });
  document.getElementById('delLogo')?.addEventListener('click', ()=>{ state.logoSrc=null; render(); });
  document.getElementById('size')?.addEventListener('input', e=>{ state.logoSize=parseInt(e.target.value); const el=document.getElementById('logoOv'); if(el) el.style.width=el.style.height=e.target.value+'px'; });
  document.querySelectorAll('.qbtn').forEach(b=>b.addEventListener('click', e=>{ state.quality=e.currentTarget.dataset.q; render(); }));
  // FORM PUB 1
  document.getElementById('addAd')?.addEventListener('click', ()=>addPub('adTitle','adDesc','adImg','adBtn','adUrl'));
  document.getElementById('addAd2')?.addEventListener('click', ()=>addPub('adTitle2','adDesc2','adImg2','adBtn2','adUrl2'));
  document.querySelectorAll('.delAd').forEach(b=>b.addEventListener('click', e=>{ state.adList.splice(parseInt(e.currentTarget.dataset.del),1); render(); }));
  document.getElementById('rot')?.addEventListener('click', ()=>{ state.adIndex=(state.adIndex+1)%state.adList.length; render(); });
  document.getElementById('mute')?.addEventListener('click', ()=>{ state.muted=!state.muted; if(refs.remote) refs.remote.muted=state.muted; render(); });
  document.getElementById('fs')?.addEventListener('click', ()=>{ if(!document.fullscreenElement) refs.box.requestFullscreen(); else document.exitFullscreen(); });
  document.getElementById('leave')?.addEventListener('click', ()=>location.href=location.pathname);
}
function addPub(t,d,i,b,u){
  const title=document.getElementById(t).value.trim();
  const desc=document.getElementById(d).value.trim();
  const img=document.getElementById(i).value.trim();
  const btn=document.getElementById(b).value.trim()||'Voir';
  const url=document.getElementById(u).value.trim()||'#';
  if(!img||!title) return alert('Titre + Image obligatoires');
  state.adList.push({title, desc, img, btn, url});
  render();
}

async function start(){
  state.status='requesting'; render();
  try{
    const q=CONFIG.qualities[state.quality];
    const stream = await navigator.mediaDevices.getDisplayMedia({
      video:{width:{ideal:q.w}, height:{ideal:q.h}, frameRate:{ideal:60, max:60}, cursor:'always'},
      audio:{echoCancellation:false, noiseSuppression:false, autoGainControl:false, sampleRate:48000}
    });
    stream.getVideoTracks().forEach(tr=>{ if('contentHint' in tr) tr.contentHint='motion'; });
    refs.stream=stream;
    const id=genId();
    const peer=new Peer(id,{config:{iceServers:CONFIG.ice}});
    refs.peer=peer; refs.calls.clear();
    peer.on('open', rid=>{ state.roomId=rid; state.status='live'; state.viewers=[]; render(); });
    peer.on('connection', conn=>{
      conn.on('open', ()=>{
        conn.on('data', data=>{
          if(data?.type==='VIEWER_INFO'){
            const ex=state.viewers.find(v=>v.id===conn.peer);
            if(ex) Object.assign(ex, data.payload);
            else state.viewers.push({id:conn.peer, joined:Date.now(), ...data.payload});
            render();
          }
        });
        try{
          const call=peer.call(conn.peer, stream);
          const senders=call.peerConnection?.getSenders();
          senders?.forEach(s=>{ if(s.track?.kind==='video'){ const p=s.getParameters(); if(!p.encodings) p.encodings=[{}]; p.encodings[0].maxBitrate=q.br*1000; p.encodings[0].priority='high'; p.degradationPreference='maintain-framerate'; s.setParameters(p).catch(()=>{}); }});
          refs.calls.set(conn.peer,{conn, call});
          state.viewers.push({id:conn.peer, ip:'Détection...', city:'-', region:'-', country:'Chargement', code:'--', isp:'-', joined:Date.now()});
          render();
        }catch{}
        conn.on('close', ()=>{ refs.calls.delete(conn.peer); state.viewers=state.viewers.filter(v=>v.id!==conn.peer); render(); });
      });
    });
    peer.on('call', c=>c.answer(stream));
    stream.getVideoTracks()[0].onended=()=>stopAll();
  }catch(e){ state.error=e.message; state.status='idle'; render(); }
}
function stopAll(){ try{ refs.stream?.getTracks().forEach(t=>t.stop()); }catch{} try{ refs.calls.forEach(({call,conn})=>{ try{call.close()}catch{} try{conn.close()}catch{} }); }catch{} try{ refs.peer?.destroy(); }catch{} refs.stream=null; refs.calls.clear(); state.viewers=[]; state.roomId=''; state.status='idle'; render(); }
function join(){ const v=document.getElementById('joinInput')?.value.trim().toUpperCase().replace(/[^A-Z0-9]/g,''); if(!v) return alert('ID invalide'); location.href=`${location.pathname}?id=${v}`; }

async function initViewer(){
  if(!isViewer) return; state.vStatus='connecting'; state.vMsg=`Connexion à ${ROOM}...`; render();
  try{
    const peer=new Peer({config:{iceServers:CONFIG.ice}});
    refs.peer=peer; const dummy=new MediaStream();
    peer.on('open', ()=>{
      const conn=peer.connect(ROOM,{reliable:true});
      conn.on('open', async ()=>{
        state.vStatus='waiting'; state.vMsg='En attente du flux...'; render();
        const info=await getIP();
        conn.send({type:'VIEWER_INFO', payload:{ip:info.ip, city:info.city, region:info.region, country:info.country, code:info.code, isp:info.isp}});
        const call=peer.call(ROOM, dummy);
        call.on('stream', s=>{
          state.remoteStream=s;
          const recv=call.peerConnection?.getReceivers().find(r=>r.track?.kind==='video');
          if(recv){ if('playoutDelayHint' in recv) recv.playoutDelayHint=0; if('jitterBufferTarget' in recv) recv.jitterBufferTarget=0; }
          state.vStatus='connected'; render();
        });
      });
      conn.on('error', ()=>{ state.vStatus='notfound'; state.vMsg='Room introuvable'; render(); });
    });
    peer.on('call', c=>{ c.answer(dummy); c.on('stream', s=>{ state.remoteStream=s; state.vStatus='connected'; render(); }); });
    peer.on('error', e=>{ if(e.type==='peer-unavailable'){ state.vStatus='notfound'; state.vMsg='ID introuvable'; render(); } });
  }catch(e){ state.vStatus='error'; state.vMsg=e.message; render(); }
}

setInterval(()=>{ state.adIndex=(state.adIndex+1)%state.adList.length; const a=document.getElementById('adImgV'); if(a) a.src=state.adList[state.adIndex]?.img; const b=document.getElementById('adLive'); if(b) b.src=state.adList[state.adIndex]?.img; }, 5000);

render(); if(isViewer) initViewer();
</script>
